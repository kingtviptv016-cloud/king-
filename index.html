<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento Seguro - Checkout</title>

    <script>
    !function(f,b,e,v,n,t,s){if(f.fbq)return;n=f.fbq=function(){n.callMethod?n.callMethod.apply(n,arguments):n.queue.push(arguments)};if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';n.queue=[];t=b.createElement(e);t.async=!0;t.src=v;s=b.getElementsByTagName(e)[0];s.parentNode.insertBefore(t,s)}(window, document,'script','https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', '2241501253286916'); // PIXEL ATUALIZADO
    fbq('track', 'PageView');
    </script>
    <noscript><img height="1" width="1" style="display:none" src="https://www.facebook.com/tr?id=2241501253286916&ev=PageView&noscript=1"/></noscript>
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #ffffff; }
        iframe { width: 100%; height: 100vh; border: none; display: block; }
    </style>
</head>
<body>

    <iframe id="tally-iframe" src="about:blank"></iframe>

    <script>
        function getCookie(name) {
            const value = "; " + document.cookie;
            const parts = value.split("; " + name + "=");
            if (parts.length === 2) return parts.pop().split(";").shift();
            return "";
        }

        async function carregarTally() {
            const urlParams = new URLSearchParams(window.location.search);
            const valor = urlParams.get('valor') || '';
            const fbclidUrl = urlParams.get('fbclid') || '';
            
            // --- LÓGICA DE RECUPERAÇÃO DO FBC ---
            // 1. Tenta buscar o rastro real pelo cookie salvo pelo Pixel
            let fbc = getCookie('_fbc');

            // 2. Se o cookie não existir, mas houver fbclid na URL, reconstrói o parâmetro
            if (!fbc && fbclidUrl) {
                fbc = `fb.1.${Date.now()}.${fbclidUrl}`;
            }

            // 3. Caso não haja rastro (acesso direto), marca como direct_access
            if (!fbc) {
                fbc = `fb.1.${Date.now()}.direct_access`;
            }

            // BUSCA PELO FBP COM RETRY (Essencial para cruzamento de dados na Meta)
            let fbp = "";
            for (let i = 0; i < 6; i++) {
                fbp = getCookie('_fbp');
                if (fbp) break; 
                await new Promise(r => setTimeout(r, 500));
            }

            const ua = navigator.userAgent.substring(0, 150);
            let ip = '';
            try {
                // Adicionado AbortController para não travar o carregamento (importante para o hardware atual)
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 2000);
                const res = await fetch('https://api.ipify.org?format=json', { signal: controller.signal });
                const data = await res.json();
                ip = data.ip;
                clearTimeout(timeoutId);
            } catch (e) { 
                ip = "1.1.1.1"; 
            }

            const tallyID = "44O9VX"; // TALLY ID ATUALIZADO
            
            // Montagem da URL com encodeURIComponent para evitar perda de dados
            const finalURL = `https://tally.so/r/${tallyID}?valor=${valor}&fbc=${encodeURIComponent(fbc)}&fbp=${fbp}&ip=${ip}&ua=${encodeURIComponent(ua)}`;
            
            const iframe = document.getElementById('tally-iframe');
            if (iframe) {
                iframe.src = finalURL;
            }
        }

        if (document.readyState === 'complete') {
            carregarTally();
        } else {
            window.addEventListener('load', carregarTally);
        }
    </script>
</body>
</html>
